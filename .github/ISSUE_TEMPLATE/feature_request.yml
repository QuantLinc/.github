name: Feature request
description: Propose a new capability or improvement.
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: The problem
      description: What user / operational pain are you solving?
    validations: { required: true }
  - type: textarea
    attributes:
      label: Proposed solution
      description: Sketch the shape — UI / API / behavior. Doesn't need to be final.
    validations: { required: true }
  - type: textarea
    attributes:
      label: Alternatives considered
  - type: textarea
    attributes:
      label: Acceptance criteria
      description: What does "done" look like? Bullet list works.
